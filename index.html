<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Apax Management | Soluciones Estratégicas de RRHH</title>
    
    <link id="favicon-link" rel="icon" type="image/png" href="/logo-color.png" />
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.symbols.outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    
    <script>
      window.tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#0a008a",
              secondary: "#020617",
              accent: "#9d4edd",
              magenta: "#9d4edd",
            },
            fontFamily: {
              display: ["Plus Jakarta Sans", "sans-serif"],
              manrope: ["Manrope", "sans-serif"],
            },
            animation: {
              'slow-zoom': 'slowZoom 20s ease-in-out infinite alternate',
              'fade-in-up': 'fadeInUp 0.8s ease-out forwards',
            },
            keyframes: {
              slowZoom: {
                'from': { transform: 'scale(1)' },
                'to': { transform: 'scale(1.1)' },
              },
              fadeInUp: {
                'from': { opacity: '0', transform: 'translateY(20px)' },
                'to': { opacity: '1', transform: 'translateY(0)' },
              }
            }
          },
        },
      };
    </script>

    <style type="text/tailwindcss">
      @layer utilities {
        .gradient-text-magenta {
          @apply text-transparent bg-clip-text bg-gradient-to-r from-[#0a008a] to-[#9d4edd];
        }
        .btn-gradient {
          @apply bg-gradient-to-r from-[#0a008a] to-[#9d4edd] hover:opacity-90 transition-all;
        }
      }
    </style>
  </head>
  <body class="bg-white dark:bg-[#020617] transition-colors duration-300">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
